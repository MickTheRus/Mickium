[global/wm]
include-file = $HOME/.config/polybar/colors.ini
include-file = $HOME/.config/polybar/modules.ini
include-file = $HOME/.config/polybar/system.ini
include-file = $HOME/.config/polybar/user_modules.ini
include-file = $HOME/.config/polybar/bars.ini

[bar/main]
wm-restack = bspwm
bottom = false
fixed-center = true
line-size = 2
background = ${color.background}
foreground = ${color.foreground}
font-0 = "Iosevka Nerd Font:size=11;3"

modules-left = workspaces 
modules-center = mpd_bar  
modules-right =  backlight alsa ethernet date 

padding = 1
separator = " "
height = 30
width = 99%
offset-x = 5
offset-y = 10

