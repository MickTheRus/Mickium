##############################################
################# LAYERRULES ################# 
##############################################

#### ROFI ####
layerrule = blur on, match:namespace rofi
layerrule = dim_around on,match:namespace rofi
layerrule = animation popin,match:namespace rofi

#### SWAYNC ####
layerrule = blur on,match:namespace swaync*
layerrule = ignore_alpha a,match:namespace swaync*
layerrule = animation slide right,match:namespace swaync*

###############################################
################# WINDOWRULES ################# 
###############################################

#### SCRATCHPAD ####
$scratchpad = ^(.*scratchpad)$

windowrule = match:class $scratchpad, float on
windowrule = match:class $scratchpad, size 90% 90%
windowrule = match:class $scratchpad, center on
windowrule = match:class $scratchpad, workspace special silent

#### CHATGPT ####
# NOTE: matching browser tabs by title can be flaky because static effects (float/size/move)
# are evaluated at window open using the *initialTitle*. See note below.
$chatgpt = .*chatgpt\.com.*

windowrule = match:title $chatgpt, float on
windowrule = match:title $chatgpt, size 50% 50%
windowrule = match:title $chatgpt, move 12 40

#### PAVUCONTROL ####
$pavucontrol = ^org\.pulseaudio\.pavucontrol$

windowrule = match:class $pavucontrol, float on
windowrule = match:class $pavucontrol, size 40% 40%
windowrule = match:class $pavucontrol, move 55% 40

#### KDE APPS ####
$kde = .*kde.*  # all classes that contain the word `kde` in them

windowrule = match:class $kde, opacity 0.87 0.8 override

### Prism Launcher ###
$prismlauncher = ^org\.prismlauncher\.PrismLauncher$

windowrule = match:class $prismlauncher, float on
windowrule = match:class $prismlauncher, size 50% 60%

### Bolt Launcher ###
# your old `*bolt-launcher*` isn’t valid regex for “contains”; this is the usual equivalent:
$boltlauncher = .*bolt-launcher.*

windowrule = match:class $boltlauncher, float on
windowrule = match:class $boltlauncher, size 50% 60%
